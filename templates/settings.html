<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки профиля - Noir Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --sidebar: #0a0a0a;
            --text: #ffffff;
            --gray: #1a1a1a;
            --border: rgba(255, 255, 255, 0.12);
            --primary: #ffffff;
            --primary-hover: rgba(255, 255, 255, 0.8);
        }
        
        body, html {
            margin: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }
        
        body {
            background-attachment: fixed;
        }
        
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .back-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }
        
        .settings-card {
            background: rgba(28, 28, 42, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .settings-card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 20px;
        }
        
        .avatar-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .avatar-display {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            overflow: hidden;
            border: 2px solid var(--primary);
        }
        
        .avatar-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }
        
        input[type="text"],
        input[type="password"],
        input[type="file"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="file"]:focus,
        input[type="email"]:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
        }
        
        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.18);
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }
        
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid #dc2626;
        }
        
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.4);
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }
        
        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border-left: 3px solid #22c55e;
            color: #86efac;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
        }
        
        .divider {
            height: 1px;
            background: var(--border);
            margin: 30px 0;
        }
        
        .username-display {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .skill-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='/chat'">← Назад в чат</button>
        
        <!-- Профиль -->
        <div class="settings-card">
            <h2>👤 Мой профиль</h2>
            
            <div class="avatar-section">
                <div class="avatar-display">
                    <img id="avatarPreview" src="/avatars/{{ username }}" onerror="this.parentElement.textContent='👤'" alt="Avatar">
                </div>
                <p style="margin: 0 0 10px; opacity: 0.7;">{{ username }}</p>
            </div>
            
            <form id="avatarForm" enctype="multipart/form-data">
                <input type="file" id="avatarInput" accept="image/*" style="display:none;">
                <button type="button" class="btn-secondary" onclick="document.getElementById('avatarInput').click()" style="width: 100%;">
                    📷 Выбрать новый аватар
                </button>
            </form>
        </div>
        
        <!-- Смена пароля -->
        <div class="settings-card">
            <h2>🔐 Безопасность</h2>
            
            <form id="passwordForm">
                <div class="form-group">
                    <label>Текущий пароль</label>
                    <input type="password" id="currentPassword" required>
                </div>
                
                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" id="newPassword" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label>Повторите новый пароль</label>
                    <input type="password" id="confirmPassword" required minlength="6">
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">💾 Изменить пароль</button>
            </form>
        </div>
        
        <!-- Опасные действия -->
        <div class="settings-card">
            <h2>⚠️ Опасная зона</h2>
            
            <button onclick="deleteAccount()" class="btn-danger" style="width: 100%;">🗑️ Удалить аккаунт</button>
        </div>
        
        <div id="messageContainer"></div>
    </div>

    <script>
        const username = "{{ username }}";
        
        // Смена аватара
        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('avatar', file);
            
            try {
                const res = await fetch('/profile/upload_avatar', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                if (data.success) {
                    showMessage('Аватар успешно изменён!', 'success');
                    const avatarUrl = data.url || ('/avatars/' + data.avatar);
                    document.getElementById('avatarPreview').src = avatarUrl + '?' + Date.now();
                } else {
                    showMessage(data.error || 'Ошибка загрузки', 'error');
                }
            } catch (err) {
                showMessage('Ошибка: ' + err.message, 'error');
            }
        });
        
        // Смена пароля
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const current = document.getElementById('currentPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (newPwd !== confirm) {
                showMessage('Пароли не совпадают', 'error');
                return;
            }
            
            if (newPwd.length < 6) {
                showMessage('Пароль должен быть минимум 6 символов', 'error');
                return;
            }
            
            try {
                const res = await fetch('/profile/change_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: current,
                        new_password: newPwd
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    showMessage('✓ Пароль успешно изменен!', 'success');
                    document.getElementById('passwordForm').reset();
                } else {
                    showMessage(data.error || 'Ошибка', 'error');
                }
            } catch (err) {
                showMessage('Ошибка: ' + err.message, 'error');
            }
        });
        
        function showMessage(msg, type) {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = msg;
            container.innerHTML = '';
            container.appendChild(div);
            
            if (type === 'success') {
                setTimeout(() => div.remove(), 3000);
            }
        }
        
        function deleteAccount() {
            if (confirm('Вы уверены? Это невозможно отменить!')) {
                if (confirm('ТОЧНО УВЕРЕНЫ? Все ваши данные будут удалены!')) {
                    fetch('/profile/delete_account', { method: 'POST' })
                        .then(() => window.location.href = '/');
                }
            }
        }
    </script>
</body>
</html>
